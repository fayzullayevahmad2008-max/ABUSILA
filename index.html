<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Player Snake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="scoreboard" aria-label="Player scores">
      <div class="score-card player-one">
        <span class="label">Player 1</span>
        <span class="value" id="score1">0</span>
        <span class="hint">W A S D</span>
      </div>
      <div class="title-group">
        <h1>Two Player Snake</h1>
        <p>First crash loses. Head-to-head collision ends in a draw.</p>
      </div>
      <div class="score-card player-two">
        <span class="label">Player 2</span>
        <span class="value" id="score2">0</span>
        <span class="hint">Arrow Keys</span>
      </div>
    </section>

    <section class="game-shell">
      <canvas
        id="gameCanvas"
        width="600"
        height="600"
        aria-label="Snake game board"
        role="img"
      ></canvas>

      <div class="overlay hidden" id="gameOverlay" aria-live="polite">
        <div class="overlay-card">
          <h2 id="gameResult">Game Over</h2>
          <p id="gameSummary">Press restart to play again.</p>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
